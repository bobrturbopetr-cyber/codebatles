<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отправка решения — CodeBattles</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: #0a0e27; color: #e0e0e0; }
        
        .header {
            background: #0f1228;
            border-bottom: 1px solid #1a1f3a;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 { font-size: 24px; color: #ff6b00; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: #e0e0e0; text-decoration: none; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 30px; }
        
        .submit-card {
            background: #0f1228;
            border-radius: 12px;
            padding: 30px;
            border: 1px solid #1a1f3a;
        }
        
        .language-select {
            width: 100%;
            padding: 12px;
            background: #1a1f3a;
            border: 1px solid #1a1f3a;
            border-radius: 8px;
            color: white;
            margin: 15px 0;
        }
        
        .code-editor {
            width: 100%;
            min-height: 400px;
            background: #1a1f3a;
            border: 1px solid #1a1f3a;
            border-radius: 8px;
            padding: 15px;
            color: #e0e0e0;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        .submit-btn {
            background: #ff6b00;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .footer {
            background: #0f1228;
            border-top: 1px solid #1a1f3a;
            padding: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>Code<span style="color:#4a90e2">Battles</span></h1>
        </div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="problems.html">Задачи</a>
            <a href="standings.html">Рейтинг</a>
        </div>
    </div>

    <div class="container">
        <div class="submit-card">
            <h1>✏️ Отправка решения</h1>
            <p style="margin: 15px 0; color: #a0a0a0;">Задача: <strong id="problemName">Загрузка...</strong></p>
            
            <select class="language-select" id="language">
                <option value="cpp">C++ 20</option>
                <option value="python">Python 3.11</option>
                <option value="java">Java 21</option>
                <option value="go">Go 1.21</option>
                <option value="rust">Rust 2024</option>
                <option value="javascript">JavaScript (Node.js)</option>
            </select>
            
            <textarea class="code-editor" id="code" placeholder="#include <iostream>
using namespace std;

int main() {
    int a, b;
    cin >> a >> b;
    cout << a + b << endl;
    return 0;
}"></textarea>
            
            <button class="submit-btn" onclick="submitSolution()">🚀 Отправить на проверку</button>
        </div>
    </div>

    <div class="footer">
        <p>© 2024-2026 CodeBattles | При поддержке Codepedia</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const problemId = urlParams.get('id');
        
        document.getElementById('problemName').textContent = problemId === '1000' ? 'A + B' : problemId || 'Задача';
        
        function submitSolution() {
            const language = document.getElementById('language').value;
            const code = document.getElementById('code').value;
            
            if (!code.trim()) {
                alert('Введите код решения');
                return;
            }
            
            alert(`Решение отправлено!\nЯзык: ${language}\nЗадача: ${problemId}\nОжидайте проверки...`);
            // Здесь будет отправка на сервер
        }
    </script>
</body>
</html>
